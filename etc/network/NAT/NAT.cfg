sysctl -w net.ipv4.ip_forward=1
iptables -t nat -A PREROUTING -d 10.100.0.3 -p tcp --dport 8080 -j DNAT --to-destination 192.168.58.11:80
iptables -t nat -A PREROUTING -d 10.100.0.3 -p tcp --dport 8081 -j DNAT --to-destination 192.168.57.252:80
iptables -t nat -A POSTROUTING -o eth0 -d 192.168.58.11 -p tcp --dport 80 -j MASQUERADE
iptables -t nat -A POSTROUTING -o eth0 -d 192.168.57.252 -p tcp --dport 80 -j MASQUERADE
iptables -A FORWARD -p tcp -d 192.168.58.11 --dport 80 -j ACCEPT
iptables -A FORWARD -p tcp -d 192.168.57.252 --dport 80 -j ACCEPT